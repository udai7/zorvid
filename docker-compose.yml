services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Exposed for local inspection; override the host port to avoid conflicts.
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${MINIO_API_HOST_PORT:-9000}:9000"       # S3 API
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"   # web console

  # One-shot job: creates the buckets on first boot, then exits.
  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb -p local/$${BUCKET_INPUTS} &&
      mc mb -p local/$${BUCKET_OUTPUTS} &&
      mc mb -p local/$${BUCKET_THUMBS} &&
      echo 'buckets ready';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      BUCKET_INPUTS: ${BUCKET_INPUTS}
      BUCKET_OUTPUTS: ${BUCKET_OUTPUTS}
      BUCKET_THUMBS: ${BUCKET_THUMBS}

  # One-shot: applies DB migrations from the built image, then exits.
  migrate:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    env_file: .env
    command: ["node", "packages/api/dist/db/migrate.js"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "3000"

  worker:
    build:
      context: .
      dockerfile: packages/worker/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    # Scale transcoding horizontally:  docker compose up -d --scale worker=3

  # Gateway: builds the React SPA, serves it, and proxies/caches /api + HLS.
  nginx:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${HTTP_HOST_PORT:-8080}:80"

volumes:
  pgdata:
  redisdata:
  miniodata:
