# Gateway: serves the dashboard, proxies the API, and caches public HLS responses.
# In production, terminate TLS here (or let Cloudflare do it) and set your domain.
#
# This file is included inside nginx's `http {}` block (mounted at conf.d/default.conf),
# so http-context directives like `upstream` and `proxy_cache_path` are valid here.

upstream api_upstream {
    server api:3000;
}

# Origin cache for public HLS. Private responses (Cache-Control: no-store) are
# never stored; public ones (Cache-Control: public, immutable) are. This is the
# local stand-in for the CDN edge and lets you see HIT/MISS without Cloudflare.
proxy_cache_path /var/cache/nginx/hls levels=1:2 keys_zone=hls_cache:10m
                 max_size=2g inactive=7d use_temp_path=off;

server {
    listen 80;
    server_name _;

    # ---- Cloudflare in front ----
    # TLS is terminated at Cloudflare, which proxies to this origin over :80.
    # Recover the real visitor IP from Cloudflare so rate-limiting (in the API)
    # and access logs see the client, not a Cloudflare edge address.
    # Source: https://www.cloudflare.com/ips  (update if Cloudflare changes ranges)
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # Allow large uploads to pass through to the API.
    client_max_body_size 2g;

    # ---- Dashboard (static SPA) ----
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # ---- HLS streams (cacheable public, pass-through private) ----
    # All HLS bytes flow through the API, which authorizes private videos and
    # sets Cache-Control. nginx (and Cloudflare in front of it) caches whatever
    # the API marks public; private responses carry no-store and bypass the cache.
    location ~ ^/api/videos/[^/]+/hls/ {
        proxy_pass http://api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache hls_cache;
        # Honor the API's Cache-Control; cache successful public responses.
        proxy_cache_valid 200 7d;
        # Don't let the per-request stream token fragment the cache for public
        # videos (private responses aren't cached regardless of this key).
        proxy_cache_key "$scheme$host$uri";
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # ---- API ----
    location /api/ {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # streaming upload: don't buffer the request body to disk first
        proxy_request_buffering off;
        proxy_read_timeout 600s;
    }
}
