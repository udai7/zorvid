# Gateway: serves the dashboard, proxies the API, and routes HLS streams to MinIO.
# In production, terminate TLS here (or let Cloudflare do it) and set your domain.

upstream api_upstream {
    server api:3000;
}

upstream minio_upstream {
    server minio:9000;
}

server {
    listen 80;
    server_name _;

    # Allow large uploads to pass through to the API.
    client_max_body_size 2g;

    # ---- Dashboard (static SPA) ----
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # ---- API ----
    location /api/ {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # streaming upload: don't buffer the request body to disk first
        proxy_request_buffering off;
        proxy_read_timeout 600s;
    }

    # ---- HLS streams (public outputs proxied straight from MinIO) ----
    # Cloudflare caches these at the edge. Private videos use signed URLs
    # issued by the API and are fetched directly from MinIO, bypassing this.
    location /streams/ {
        # /streams/<key>  ->  minio/outputs/<key>
        rewrite ^/streams/(.*)$ /outputs/$1 break;
        proxy_pass http://minio_upstream;
        proxy_set_header Host $host;

        # Cache hints for the CDN.
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }
    }
}
